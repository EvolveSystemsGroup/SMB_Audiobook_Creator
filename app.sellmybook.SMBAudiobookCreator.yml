app-id: app.sellmybook.SMBAudiobookCreator
runtime: org.gnome.Platform
runtime-version: "50"
sdk: org.gnome.Sdk
sdk-extensions:
  - org.freedesktop.Sdk.Extension.dotnet8
command: smb-ab-creator
build-options:
  prepend-path: /usr/lib/sdk/dotnet8/bin
  append-ld-library-path: /usr/lib/sdk/dotnet8/lib
  prepend-pkg-config-path: /usr/lib/sdk/dotnet8/lib/pkgconfig
finish-args:
  - --share=ipc
  - --socket=wayland
  - --socket=fallback-x11
modules:
  - name: lame
    buildsystem: autotools
    config-opts:
      - --enable-shared
      - --disable-static
      - --disable-frontend
    post-install:
      - sed -i -e 's/^\(\s*hardcode_libdir_flag_spec\s*=\).*/\1/' /app/lib/libmp3lame.la
    cleanup:
      - /include
      - /lib/*.a
      - /lib/*.la
      - /share/doc
      - /share/man
    sources:
      - type: archive
        url: https://downloads.sourceforge.net/lame/lame-3.100.tar.gz
        sha256: ddfe36cab873794038ae2c1210557ad34857a4b6bdc515785d1da9e175b1da1e

  - name: ffmpeg
    buildsystem: autotools
    config-opts:
      - --prefix=/app
      - --disable-debug
      - --disable-doc
      - --disable-static
      - --enable-shared
      - --disable-gpl
      - --disable-nonfree
      - --enable-libmp3lame
    cleanup:
      - /include
      - /lib/*.a
      - /lib/*.la
      - /share/doc
      - /share/ffmpeg/examples
      - /share/man
    sources:
      - type: archive
        url: https://ffmpeg.org/releases/ffmpeg-7.1.1.tar.xz
        sha256: 733984395e0dbbe5c046abda2dc49a5544e7e0e1e2366bba849222ae9e3a03b1

  - build-aux/tone.json

  - name: smb-ab-creator
    buildsystem: simple
    build-commands:
      - install -Dm755 data/smb-ab-creator /app/bin/smb-ab-creator
      - install -Dm755 src/main.py /app/share/smb-ab-creator/main.py
      - install -Dm644 data/gmb-page.png /app/share/smb-ab-creator/data/gmb-page.png
      - install -Dm644 data/app.sellmybook.SMBAudiobookCreator.desktop /app/share/applications/app.sellmybook.SMBAudiobookCreator.desktop
      - install -Dm644 data/app.sellmybook.SMBAudiobookCreator.metainfo.xml /app/share/metainfo/app.sellmybook.SMBAudiobookCreator.metainfo.xml
      - install -Dm644 data/app.sellmybook.SMBAudiobookCreator.svg /app/share/icons/hicolor/scalable/apps/app.sellmybook.SMBAudiobookCreator.svg
      - install -Dm644 data/app.sellmybook.SMBAudiobookCreator.png /app/share/icons/hicolor/512x512/apps/app.sellmybook.SMBAudiobookCreator.png
    sources:
      - type: archive
        url: https://github.com/EvolveSystemsGroup/SMB_Audiobook_Creator/archive/refs/tags/v2.0.0.tar.gz
        sha256: eb8fad9579b8d1e6637a8e9739a5d9560362bf5940f98c74512f92e586fd588d
